<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>서울 아파트 실거래가 검색</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">국토교통부 실거래가 API 기반</div>
      <h1>서울 아파트 실거래가 검색</h1>
      <p>25개 구를 선택하고, 리스트에서 클릭하거나 등록되지 않은 단지도 직접 검색하세요.</p>
    </section>

    <section class="card search-card">
      <div class="top-row">
        <label>시작월<input id="startMonth" type="month" /></label>
        <label>종료월<input id="endMonth" type="month" /></label>
      </div>

      <div class="section-title">
        <h2>1. 구 선택</h2>
        <span id="selectedRegionText">강남구 선택됨</span>
      </div>
      <div id="regionButtons" class="region-buttons"></div>

      <div id="aptPanel" class="apt-panel open">
        <div class="section-title apt-title">
          <h2>2. 아파트 선택</h2>
          <span id="aptCountText">아파트 리스트</span>
        </div>

        <div class="apt-search-bar">
          <input id="aptFilter" class="apt-filter" placeholder="아파트명 검색 예: 은마, 래미안, 자이" />
          <button id="directSearchBtn" class="direct-btn">입력명으로 조회</button>
        </div>

        <div class="quick-help">
          리스트는 대표 단지 위주입니다. 목록에 없어도 단지명을 직접 입력하면 해당 구의 실거래 데이터에서 검색합니다.
        </div>

        <div id="aptList" class="apt-list vertical"></div>
      </div>
    </section>

    <section id="summary" class="summary hidden"></section>

    <section class="card result-card">
      <div class="result-head">
        <h2 id="resultTitle">검색 결과</h2>
        <button id="csvBtn" class="ghost" disabled>CSV 다운로드</button>
      </div>
      <div id="status" class="status">구와 아파트를 선택해 주세요.</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>계약일</th>
              <th>구/동</th>
              <th>아파트</th>
              <th>전용㎡</th>
              <th>층</th>
              <th>금액</th>
              <th>건축년도</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="apt-list.js"></script>
  <script src="app.js"></script>
</body>
</html>
